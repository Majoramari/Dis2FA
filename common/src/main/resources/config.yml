# Dis2FA Configuration

# Language settings (en, ar)
locale: "en"
fallback-locale: "en"

# Discord bot token (required)
bot-token: ""

# Discord server invite (shown in kick message)
discord-invite: "discord.gg/yourinvite"

# Channel ID where device-approval requests are sent
alerts-channel-id: ""

# Discord server settings
discord:
  # Your Discord server (guild) ID
  guild-id: ""
  # Clear global commands on startup (avoids outdated command errors)
  clear-global-commands: true
  # Bot name shown in Minecraft messages (leave empty to auto-detect)
  bot-name: ""
  # Link channel name shown in Minecraft messages (leave empty to auto-detect)
  link-channel-name: ""
  # Allowed role IDs (any of these roles can join). Empty = allow all roles.
  allowed-role-ids: []
  # Require the user to be in the Discord server
  require-member: true
  # REST lookup timeout when checking membership/roles/bans
  member-check-timeout-seconds: 5
  # Allow linking by sending codes in a guild channel
  allow-guild-link: true
  # Channel where link requests/buttons are posted (recommended)
  link-channel-id: ""
  # Bot presence settings
  presence:
    # online, idle, dnd, invisible
    status: "online"
    activity:
      # playing, listening, watching, competing, custom
      type: "playing"
      # Set empty or "off" to disable activity
      # Placeholders: {PLAYERS}, {MAX_PLAYERS}, {TPS}
      text: "Minecraft"
    # How often to refresh presence placeholders (0 = disable updates)
    update-seconds: 30

# Ban sync (Discord -> Minecraft only)
ban-sync:
  enabled: false
  # If true, add a Minecraft ban when user is banned on Discord
  apply-minecraft-ban: true
  ban-reason: "Banned on Discord"

# Verification code settings
code-length: 4
code-expiration-seconds: 600

# Device approval expiration (seconds)
device-approval-seconds: 600

# Device ID settings (IP-based)
device-id:
  # Random salt used to hash UUID+IP (auto-generated if empty)
  salt: ""
  # Use shorter prefixes if players have dynamic IPs
  ip-prefix-v4: 32
  ip-prefix-v6: 128

# Chat bridge (Discord <-> Minecraft)
chat-bridge:
  enabled: false
  # Discord channel ID to sync
  discord-channel-id: ""
  # Webhook URL for sending Minecraft chat to Discord
  webhook-url: ""
  # Webhook username format
  webhook-username-format: "{PLAYER}"
  # Avatar URL template (Minecraft head)
  avatar-url: "https://minotar.net/avatar/{PLAYER}/128"
  # Format for Discord -> Minecraft messages
  minecraft-format: "&9[Discord] &b{USER}&7: &f{MESSAGE}"
  # Format for Minecraft -> Discord messages
  discord-format: "{MESSAGE}"
  bridge-joins: true
  bridge-quits: true
  bridge-deaths: true
  bridge-advancements: true
  join-format: "joined the game"
  quit-format: "left the game"
  death-format: "{MESSAGE}"
  advancement-format: "earned the advancement **{ADVANCEMENT}**"

# Web config editor (optional)
web-editor:
  # Enable the web editor
  enabled: true
  # Bind address (use 127.0.0.1 for local-only access)
  bind-address: "0.0.0.0"
  # Port to serve the editor on
  port: 8166
  # Access token (auto-generated if empty). Keep this private.
  token: ""
  # Optional public URL for magic links (e.g. https://panel.example.com)
  public-url: ""
